name: Bexar County Lead Scraper

on:
  schedule:
    # 1x daily at 7:00 AM Central (12:00 UTC) — Bexar certifies overnight
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback window (days)'
        required: false
        default: '14'
      chunk_days:
        description: 'Date chunk size (days). Smaller = more thorough, slower'
        required: false
        default: '2'
      skip_parcels:
        description: 'Skip BCAD parcel lookup?'
        type: boolean
        required: false
        default: false
      allow_incomplete:
        description: 'Include incomplete records (debug)?'
        type: boolean
        required: false
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # generous — v8 does chunk-based deep scraping

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          BEXAR_EMAIL:        ${{ secrets.BEXAR_EMAIL }}
          BEXAR_PASSWORD:     ${{ secrets.BEXAR_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL: INFO
        run: |
          DAYS="${{ github.event.inputs.days || '14' }}"
          CHUNK="${{ github.event.inputs.chunk_days || '2' }}"
          ARGS="--days $DAYS --chunk-days $CHUNK"
          [ "${{ github.event.inputs.skip_parcels }}" = "true" ] && ARGS="$ARGS --no-parcel"
          [ "${{ github.event.inputs.allow_incomplete }}" = "true" ] && ARGS="$ARGS --allow-incomplete"
          echo "Running: python scraper/fetch.py $ARGS"
          python scraper/fetch.py $ARGS

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "scraper: $(date -u +%Y-%m-%d) daily run"
            git push
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output-${{ github.run_number }}
          path: |
            data/leads_ghl.csv
            data/hot_leads_today.csv
            data/records.json
            data/last_run.log
            data/coverage_audit.json
          retention-days: 30
